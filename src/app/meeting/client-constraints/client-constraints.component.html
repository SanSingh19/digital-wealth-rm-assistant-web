<div class="outer-box" style="background-color:ghostwhite;margin-top:-105px">
  <div class="card anim-up" style="animation-delay: 60ms">
    <div class="card-header">
      <h3 class="card-title" style="color: rgb(26, 74, 122);">Client Constraints</h3>
    </div>
    <div>
      <ul class="card-content">
        <li *ngFor="let constraint of constraints().constraints" class="constraint-item">{{ constraint }}</li>
      </ul>
    </div>
  </div>
</div>
