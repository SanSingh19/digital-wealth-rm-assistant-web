<div class="outer-box" style="background-color:ghostwhite;margin-top:-195px">
  <div class="card anim-up" style="animation-delay: 60ms">
    <div class="card-header">
      <span class="icon">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 3a4 4 0 100 8 4 4 0 000-8z"
          ></path>
        </svg>
      </span>
      <h3 class="card-title">Client Profile</h3>
    </div>
    <div class="card-content">
      <ng-container *ngIf="clientProfile() as profile">
        <!-- Now you can use 'profile' in this block -->
        <div class="info-row" *ngIf="profile.name">
          <span class="info-label">Name</span>
          <span class="info-value">{{ profile.name }}</span>
        </div>
        <div class="info-row" *ngIf="profile.age">
          <span class="info-label">Age</span>
          <span class="info-value">{{ profile.age }}</span>
        </div>
        <div class="info-row" *ngIf="profile.profession">
          <span class="info-label">Profession</span>
          <span class="info-value">{{ profile.profession }}</span>
        </div>
        <div class="info-row" *ngIf="profile.riskProfile">
          <span class="info-label">Risk Profile</span>
          <span class="info-value">{{ profile.riskProfile }}</span>
        </div>
        <div class="info-row" *ngIf="profile.esgPreference">
          <span class="info-label">ESG Preference</span>
          <span class="info-value">{{ profile.esgPreference }}</span>
        </div>
        <div class="info-row" *ngIf="profile.serviceModel">
          <span class="info-label">Service Model</span>
          <span class="info-value">{{ profile.serviceModel }}</span>
        </div>
        <div class="info-row" *ngIf="profile.investmentGoals">
          <span class="info-label">Investment Goals</span>
          <span class="info-value">{{ profile.investmentGoals }}</span>
        </div>
      </ng-container>
    </div>
  </div>
</div>
