<div class="outer-box" style="background-color:ghostwhite;margin-left: 578px;margin-top: 22px;">
    <div class="card anim-up">
      <div class="card-header">
        <span class="text-[#1a4a7a]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z">
                </path>
            </svg>
        </span>
        <h3 class="card-title-desc">AI Recommendations</h3>
      </div>
      <div class="ai-recommendations-subheader">
        <span class="ai-recommendations-subheader-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
             {{aiRecommendations()?.complianceStatus}}
        </span>
        <span class="ai-recommendations-subheader-desc">
            {{aiRecommendations()?.suitabilityProfile}}
        </span>
      </div>
    <div>
        <div class="ai-recommendations-content-box" *ngFor="let item of aiRecommendations()?.recommendations">
           <div class="ai-recommendations-content">
              <div class="ai-recommendations-content-item">
                <span [ngClass]="{'ai-recommendations-content-item-label': item.action !== 'SWITCH', 'ai-recommendations-content-item-label-blue': item.action === 'SWITCH'}">
                    {{item.action}}
                </span>
                <span class="ai-recommendations-content-item-label1">
                    {{item.product}}
                </span>
                <span class="ai-recommendations-content-item-label2">
                    {{item.priority}}
                </span>
            </div>
            <p class="ai-recommendations-content-item-value">
                    {{item.rationale}}  
          </p>
        </div>
        </div>
              
    

        
    </div>
    </div>
